body:
  text: 大悲啟請准經凡欲受持先志心念阿彌陀佛三遍緣阿彌陀佛是觀音本師矣仰啟月輪觀自在廣大圓滿紫金身千臂恒伸現世間千眼光明常遍照一千二百真言契能滿眾生所願心面安三目遍莊嚴頂戴彌陀持寶器宣讚真言微妙法受持當證佛菩提辯才無礙化人天菩薩眾中為上首暫聞尚滅塵沙業諷念惟增成佛因大悲願力不思議是故我今恒讚念南無大悲觀世音願我速知一切法南無大悲觀世音願我早得智慧眼南無大悲觀世音願我速度一切眾南無大悲觀世音願我早得善方便南無大悲觀世音願我速乘般若舡南無大悲觀世音願我早得越苦海南無大悲觀世音願我速得戒定道南無大悲觀世音願我早登涅槃山南無大悲觀世音願我速會無為舍南無大悲觀世音願我早同法性身我若向刀山刀山自摧折我若向火湯火湯自消滅我若向地獄地獄自枯渴我若向餓鬼餓鬼自飽滿我若向修羅惡心自調伏我若向畜生自得大智慧千手千眼觀世音菩薩廣大圓滿無障礙大悲心陀羅尼神妙章句南無喝囉怛那哆囉夜耶一南無阿唎耶二婆盧羯帝爍鉢囉耶三菩提薩埵婆耶四摩訶薩埵婆耶五摩訶迦盧尼迦耶六唵七薩皤囉罰曳八數怛那怛寫九南無悉吉㗚埵伊蒙阿唎耶十婆盧羯帝室佛楞馱婆十一南無那囉謹墀十二醯唎摩訶皤哆沙咩羊聲呼十三薩婆阿他豆輸朋十四阿逝孕十五薩婆薩哆那摩婆伽十六摩罰特豆十七怛姪他十八唵十九阿婆盧醯盧迦帝二十迦囉帝二十一夷醯唎摩訶菩提薩埵二十二薩婆薩婆二十三摩囉摩囉二十四弟子佛受持摩醯摩醯唎馱孕二十五俱盧俱盧羯懞二十六度嚧度嚧罰闍耶帝摩訶罰闍耶帝二十七陀囉陀囉二十八地唎尼二十九室佛囉耶三十遮囉遮囉三十一摩摩罰摩羅三十二穆帝麗伊醯移醯三十四室那室那三十五阿囉嘇佛囉舍利三十六罰沙罰嘇三十七佛囉舍利三十八呼盧呼盧摩囉三十九呼盧呼盧醯唎四十娑囉娑囉悉唎悉唎四十二蘇盧蘇盧四十三菩提夜菩提夜四十四菩馱夜菩馱夜四十五彌帝唎夜那囉謹墀四十六他姪唎瑟尼那四十七波夜摩那四十八娑婆訶四十九悉陀夜五十娑婆訶五十一摩訶悉陀夜五十二娑婆訶五十三悉陀喻藝五十四室皤囉耶五十五娑婆訶五十六那囉謹墀五十七娑婆訶五十八摩囉那囉五十九娑婆訶六十悉囉僧阿穆佉耶六十一娑婆訶六十二娑婆摩阿悉陀耶六十三娑婆訶六十四者吉囉阿悉陀耶六十五娑婆訶六十六波陀摩羯悉哆耶六十七娑婆訶六十八那囉謹墀皤伽羅耶六十九娑婆訶七十摩婆唎勝羯囉夜七十一娑婆訶七十二南無喝囉怛那哆囉夜耶七十三南無阿唎耶七十四婆盧吉帝爍皤囉耶七十五娑婆訶七十六悉殿都七十七漫多羅佛陀耶七十八娑婆訶七十九千手千眼觀世音菩薩廣大圓滿無礙大悲心陀羅尼迴向願讀誦功德普及諸有情我等與眾生皆共成佛道
